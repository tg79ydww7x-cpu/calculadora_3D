<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora 3D</title>

    <link rel="stylesheet" href="base.css">
    <link rel="icon" type="image/png" href="calculadora.png">

</head>
<body>
        <div class="calculadora">
            <div class="pantalla">
                1,234,567.89
            </div>

            <div class="contenedor-botones">
                <div class="fila">
                    <button class="btn-borrar">C</button>
                    <button>±</button>
                    <button>%</button>
                    <button>÷</button>
                </div>
                <div class="fila">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>×</button>
                </div>
                <div class="fila">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>−</button>
                </div>
                <div class="fila">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>+</button>
                </div>
                <div class="fila">
                    <button class="btn-cero">0</button>
                    <button>.</button>
                    <button class="btn-igual">=</button>
                </div>
            </div>
        </div>
</body>
</html>
