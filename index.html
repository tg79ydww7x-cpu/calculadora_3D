<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estructuras de HTML</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="contenedor-principal">
        <header class="bloque-base color-header">&lt;header&gt;</header>
        <nav class="bloque-base color-nav">&lt;nav&gt;</nav>

        <div class="seccion-intermedia">
            <aside class="bloque-base color-aside">&lt;aside&gt;</aside>
            <main class="bloque-base color-main">&lt;main&gt;
                <article class="bloque-base color-article">&lt;article&gt;
                    <figure class="bloque-base color-figure">&lt;figure&gt;</figure>
                    <p class="bloque-base color-p">&lt;p&gt;</p>
                </article>
                <section class="bloque-base color-section">&lt;section&gt;</section>
            </main>
        </div>

        <footer class="bloque-base color-footer">&lt;footer&gt;</footer>
    </div>
</body>
</html>
